name: dfxm-geo-dev
channels:
  - conda-forge
dependencies:
  - python>=3.11
  - pip
  # Runtime (mirrors environment.yml).
  - numpy>=1.23,<3
  - scipy>=1.10,<2
  - numba>=0.56
  - matplotlib>=3.6
  - seaborn>=0.12
  - fabio>=2023.4
  - joblib>=1.3
  - tqdm>=4.66.3
  - xraylib>=4.1
  - plotly>=5
  - psutil>=5
  # Dev tooling.
  - pytest>=8
  - pytest-cov>=4
  - pytest-benchmark>=4
  - ruff>=0.6
  - mypy>=1.10
  - pre-commit>=3.7
  - ipykernel
  - jupyterlab
  - pip:
    - -e .
