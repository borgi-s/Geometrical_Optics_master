# Default DFXM forward-simulation config.
#
# Every block below shows the DEFAULT value the pipeline would use if
# the block were omitted entirely. A literally-empty .toml file is a
# valid input: `dfxm-forward --config <empty.toml>` produces a single
# detector image of a single canonical FCC dislocation at the origin,
# Al 111 reflection at 17 keV. (The empty case uses the dataclass
# defaults: b=(1, 0, -1), n=(1, 1, 1), t=(1, -2, 1).)
#
# Edit any block to override; delete any block to fall back to the
# default shown here.
#
# The active [crystal] + [scan] blocks below are tuned to produce the
# recognizable 2D mosa rocking grid out-of-the-box for users running
# `dfxm-forward --config configs/default.toml` — this is NOT what an
# empty .toml produces (empty = single image, IUCrJ-canonical slip system).

[reciprocal]
# Default. Override or omit.
# Used by `dfxm-bootstrap --config configs/default.toml` to (re)generate the
# reciprocal-space resolution kernel pickle. Defaults reproduce the CDD_inc
# canonical recipe (Al 111 reflection at 17 keV, square-aperture beamstop
# 25 mm at the BFP). Takes ~50 s wall-clock on a laptop at Nrays=1e8.
hkl        = [-1, 1, -1]   # Al 111 reflection (default)
keV        = 17.0          # beam energy in keV
Nrays      = 100_000_000   # 1e8
npoints1   = 400
npoints2   = 200
npoints3   = 200
qi1_range  = 5e-4
qi2_range  = 7.5e-3
qi3_range  = 7.5e-3
# Beam / objective parameters.
zeta_v_fwhm = 5.3e-4
zeta_h_fwhm = 0.0
NA_rms      = 3.1106382978723403e-4  # = 7.31e-4 / 2.35
eps_rms     = 6.0e-5                 # = 1.41e-4 / 2.35
# theta is auto-derived from Al 111 + 17 keV when absent (see kernel.cli_main).
D  = 0.000565685424949238   # = 2 * sqrt(50e-6 * 1.6e-3)
d1 = 0.274
# Beamstop config.
# backend = "auto"   # "auto" (analytic when beamstop off, else MC) | "analytic" | "mc"
beamstop   = true
bs_height  = 25e-3
aperture   = true
knife_edge = false
dphi_range = 0.0
# seed = 0   # optional: pin the MC ray-sampling RNG for a bit-reproducible
            # kernel. Omit (default) for an entropy-seeded random run. The CLI
            # flag `dfxm-bootstrap --seed N` overrides this value.

# Scan: per-axis primitives. Each axis is independently fixed (value, default 0)
# or scanned (value + range + steps). Mode name is derived.

[scan.phi]
# Override-only: omit for fixed-at-0. Together with [scan.chi] this gives
# the 2D "mosa" rocking grid the IUCrJ paper used.
range = 6e-4               # rad; half-range (0.034 deg in old degrees)
steps = 61

[scan.chi]
# Override-only: omit for fixed-at-0. Together with [scan.phi] this gives
# the 2D "mosa" rocking grid the IUCrJ paper used.
range = 2e-3               # rad; half-range (0.115 deg in old degrees)
steps = 61

# [scan.two_dtheta]        # omitted -> fixed at 0 (no strain scan)
# [scan.z]                 # omitted -> fixed at 0 (no z translation)
# Derived scan-mode label: "mosa" (phi + chi).

# Crystal: active mode = centered. Commented-out blocks show the other two modes.

[crystal]
# Default: mode = "centered" with canonical FCC primary slip system.
# Override-only: change `mode` and provide the matching sub-block.
mode = "centered"

[crystal.centered]
# This file uses the IUCrJ b/n/t (1,-1,0)/(1,1,1)/(1,1,-2) to keep
# `dfxm-forward --config configs/default.toml` output bit-stable.
# The empty-TOML fall-through uses different canonical values:
# b=(1,0,-1), n=(1,1,1), t=(1,-2,1).
b = [1, -1, 0]   # Burgers vector indices
n = [1, 1, 1]    # slip plane normal indices
t = [1, 1, -2]   # dislocation line direction

# [crystal.wall]       # required (no defaults as of v2.0.0): dis, ndis, sample_remount
# dis = 4.0
# ndis = 151
# sample_remount = "S1"

# [crystal.random_dislocations]
# ndis = 4
# sigma = 5.0
# min_distance = 4.0
# seed = 42

[io]
# Default. Override or omit.
fn_prefix = "/mosa_test_0000_"
ftype = ".npy"
dislocs_dirname = "images10"
perfect_dirname = "images10_perf_crystal"
include_perfect_crystal = true
# max_workers = 4  # uncomment to cap parallel forward() calls; None = auto

[postprocess]
# Default. Override or omit.
enabled = true
chi_oversample = 20
phi_oversample = 20
chi_oversample_for_shift = 100
figures_dirname = "figures"
data_dirname = "analysis"
