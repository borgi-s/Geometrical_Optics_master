# Default DFXM forward-simulation config.
# Mirrors the parameters used in the original init_forward.py demo.
#
# Notes:
#   - phi_range / chi_range are half-ranges in *degrees* (consistent with
#     save_images_parallel's API, which converts to radians internally).
#   - dis is the inter-dislocation distance in micrometers.
#   - psize, zl_rms, and the (h, k, l) reflection are currently bound to the
#     module-level defaults in dfxm_geo.direct_space.forward_model (ID06
#     settings). See pipeline.py docstring for the deferred work.

[crystal]
dis = 4        # inter-dislocation distance (µm)
ndis = 151     # number of dislocations
sample_remount = "S1"  # one of "S1", "S2", "S3", "S4" — Purdue 2024 paper. Default: identity (no remount).

[scan]
# 0.0006 rad ≈ 0.03438 deg ; 0.002 rad ≈ 0.11459 deg
phi_range = 0.034377467707849395
phi_steps = 61
chi_range = 0.11459155902616465
chi_steps = 61

[io]
fn_prefix = "/mosa_test_0000_"
ftype = ".npy"
dislocs_dirname = "images10"
perfect_dirname = "images10_perf_crystal"
include_perfect_crystal = true
# max_workers = 4  # uncomment to cap parallel forward() calls; None = auto

[postprocess]
enabled = true
chi_oversample = 20
phi_oversample = 20
chi_oversample_for_shift = 100
figures_dirname = "figures"
data_dirname = "analysis"

[reciprocal]
# Used by `dfxm-bootstrap --config configs/default.toml` to (re)generate the
# reciprocal-space resolution kernel pickle. Defaults reproduce the CDD_inc
# canonical recipe (Al 111 reflection at 17 keV, square-aperture beamstop
# 25 mm at the BFP). Takes ~50 s wall-clock on a laptop at Nrays=1e8.
Nrays      = 100_000_000   # 1e8
npoints1   = 400
npoints2   = 200
npoints3   = 200
qi1_range  = 5e-4
qi2_range  = 7.5e-3
qi3_range  = 7.5e-3
# Beam / objective parameters.
zeta_v_fwhm = 5.3e-4
zeta_h_fwhm = 0.0
NA_rms      = 3.110638297872340e-4  # = 7.31e-4 / 2.35
eps_rms     = 6.0e-5                # = 1.41e-4 / 2.35
# theta is auto-derived from Al 111 + 17 keV when absent (see kernel.cli_main).
D  = 0.000565685424949238   # = 2 * sqrt(50e-6 * 1.6e-3)
d1 = 0.274
# Beamstop config.
beamstop   = true
bs_height  = 25e-3
aperture   = true
knife_edge = false
dphi_range = 0.0
