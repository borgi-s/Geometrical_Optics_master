# dis = 0.5 µm dislocation spacing. ndis=1151 is the minimum recommended
# by init_forward.py to avoid edge effects at this density.

[crystal]
dis = 0.5
ndis = 1151

[scan]
phi_range = 0.034377467707849395
phi_steps = 61
chi_range = 0.11459155902616465
chi_steps = 61

[io]
fn_prefix = "/mosa_test_0000_"
ftype = ".npy"
dislocs_dirname = "images_dis0p5"
perfect_dirname = "images_dis0p5_perf_crystal"
include_perfect_crystal = true

[reciprocal]
hkl = [-1, 1, -1]   # Al 111 reflection — preserves pre-D implicit default
keV = 17.0
