name: Publish

# Tag-driven release pipeline. Pushing a `vX.Y.Z` tag builds the package,
# publishes to TestPyPI, then waits for manual approval before publishing
# to PyPI. Auth uses PyPI Trusted Publishers (OIDC) — no tokens stored.
#
# See docs/publishing.md for the one-time Trusted Publisher setup and
# GitHub Environment configuration.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish (manual run only)"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJ_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          echo "Tag version:    $TAG_VERSION"
          echo "Pyproject ver:  $PYPROJ_VERSION"
          if [ "$TAG_VERSION" != "$PYPROJ_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject.toml version $PYPROJ_VERSION"
            exit 1
          fi

      - name: Build wheel + sdist
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi')
    environment:
      name: testpypi
      url: https://test.pypi.org/project/dfxm-geo/
    permissions:
      id-token: write  # for PyPI Trusted Publisher (OIDC)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    # On tag push: gated on TestPyPI success. On manual dispatch with
    # target=pypi: builds directly (skips TestPyPI). Manual approval is
    # enforced by the `pypi` GitHub Environment protection rule.
    needs: [build, publish-testpypi]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (
        (github.event_name == 'push' && needs.publish-testpypi.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
      )
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/dfxm-geo/
    permissions:
      id-token: write  # for PyPI Trusted Publisher (OIDC)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
