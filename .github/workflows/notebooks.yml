name: notebooks

on:
  push:
    branches: [main]
    paths: ["examples/**", "src/**", ".github/workflows/notebooks.yml"]
  pull_request:
    paths: ["examples/**", "src/**", ".github/workflows/notebooks.yml"]

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + nbmake
        run: python -m pip install -e ".[dev]" nbmake

      - name: Execute tutorial notebooks 01-03
        working-directory: examples
        run: >
          python -m pytest -q -p no:cacheprovider --nbmake --nbmake-timeout=900
          01_quickstart.ipynb
          02_reciprocal_space.ipynb
          03_dislocations_and_contrast.ipynb
