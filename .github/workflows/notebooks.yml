name: notebooks

on:
  push:
    branches: [main]
    paths: ["examples/**", "src/**", ".github/workflows/notebooks.yml"]
  pull_request:
    paths: ["examples/**", "src/**", ".github/workflows/notebooks.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache tutorial kernel
        uses: actions/cache@v4
        with:
          path: examples/kernel
          key: tutorial-kernel-h-1k1l-1-17kev-nrays1e8-seed0-v1

      - name: Install package + nbmake
        run: python -m pip install -e ".[dev]" nbmake

      - name: Execute tutorial notebooks 01-03
        working-directory: examples
        run: >
          python -m pytest -q -p no:cacheprovider --override-ini=addopts= --nbmake --nbmake-timeout=900
          01_quickstart.ipynb
          02_reciprocal_space.ipynb
          03_dislocations_and_contrast.ipynb
