# Paper Figure 3B reproduction config (arXiv:2503.22022v1, §6.1 + §6.2 + Fig 3 caption)
# Single-edge-dislocation Al phantom at the η=20.233°, θ=15.417° oblique reflection.
# Uses reflection (-1, -1, 3); 3 other reflections in the same group are
# {(-1, 1, 3), (1, -1, 3), (1, 1, 3)} — Phase B will iterate over the group.

[crystal]
# Lattice + mount (oblique-angle schema, Task 11 / v2.3.0).
lattice  = "cubic"
a        = 4.0493e-10
mount_x  = [1, 0, 0]
mount_y  = [0, 1, 0]
mount_z  = [0, 0, 1]
# Dislocation layout (pipeline schema, v2.0.0+).
mode     = "centered"

[crystal.centered]
# Edge dislocation per paper §6.1. b ⊥ n is the pipeline invariant; for
# {111} slip with n=(1,1,-1) the in-plane <110> Burgers vectors are
# (1,-1,0), (1,0,1), (0,1,1). t = (b × n)/|b × n| = (1,1,2). The plan
# document had a b=[1,1,0] typo that violates b·n=0; corrected here.
b = [1, -1, 0]   # Burgers vector
n = [1, 1, -1]   # slip plane normal
t = [1, 1, 2]    # line direction

[geometry]
mode = "oblique"
eta  = 0.353140                # 20.233° in radians

[reciprocal]
hkl         = [-1, -1, 3]
keV         = 19.1
Nrays       = 100_000_000
npoints1    = 400
npoints2    = 200
npoints3    = 200
qi1_range   = 5e-4
qi2_range   = 7.5e-3
qi3_range   = 7.5e-3
zeta_v_fwhm = 0.027e-3        # 0.027 mrad vertical divergence FWHM (paper section 6.2)
zeta_h_fwhm = 0.0
NA_rms      = 2.366e-4         # 0.556 mrad FWHM CRL acceptance / 2.35
eps_rms     = 6.0e-5
beamstop    = false
aperture    = false            # paper Fig 3B uses no beamstop / no aperture

# Detector geometry uses the forward-model module defaults (object pixel 40 nm,
# Npixels 510). The previous unconsumed [detector_geometry] block (psize/psf/
# thermal keys from the pre-v3 noise model) was removed when [detector_geometry]
# became a real, validated schema.

# Single detector image at the Fig 3B caption setpoint (NOT a scan).
# Paper Fig 3B caption: dtheta=-0.42, phi=+0.46, chi=+0.067 mrad. dfxm axis map:
#   phi (rocking)  -> [scan.phi]
#   chi (rolling)  -> [scan.chi]
#   dtheta (Bragg) -> [scan.two_dtheta]   (code treats two_dtheta as dtheta directly)
# (The earlier config had these three values scrambled onto the wrong axes.)
# AxisScanConfig: `value` = fixed setpoint; omit range/steps for a single image.
[scan.phi]
value = 0.46e-3

[scan.chi]
value = 0.067e-3

[scan.two_dtheta]
value = -0.42e-3

[io]
write_strain_provenance = true
