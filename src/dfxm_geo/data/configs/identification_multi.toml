# Default DFXM identification config (mode='multi').
#
# Every block below shows the DEFAULT value `dfxm-identify` would use if
# the block were omitted. A literally-empty .toml file is a valid input —
# the result for an empty .toml is mode='single' + canonical {111} sweep
# + default noise + Al 111 @ 17 keV. To get the mode='multi' behavior
# this file describes, the [multi] block below is required (no default).
#
# Edit any block to override; delete any block to fall back to the
# default shown here.
#
# dfxm-identify: Monte Carlo over 2 random dislocations per image.
#
# Forward-looking extension beyond Borgi 2025; intended for ML-training-data
# generation. Each sample image contains two mixed-character dislocations
# with independently drawn (slip plane, Burgers vector, rotation angle,
# in-plane position). v1.2.0 writes a master `dfxm_identify.h5` + per-scan
# `scanNNNN/dfxm_sim_detector_0000.h5` files. Per-scan ground truth lives
# under `/N.1/sample/dislocations/{0,1}` (positions, Burgers, rotations).
# Opt-in `render_per_dislocation = true` adds noiseless `_dis0` / `_dis1`
# detector files per scan for unambiguous instance labels.

mode = "multi"

[reciprocal]
hkl = [-1, 1, -1]   # Al 111 reflection — preserves pre-D implicit default
keV = 17.0

[crystal]
slip_plane_normal = [1, 1, 1]      # ignored in mode='multi'; required by validation
# angle_*_deg and b_vector_indices are also unused in 'multi' mode

[scan.phi]
value = 1.5e-4

[detector]
rng_seed = 0

[multi]
n_samples = 1000
pos_std_um = 5.0                   # std of in-plane (x, y) draws
render_per_dislocation = false     # true: also emit noiseless per-disloc detector files

[io]
fn_prefix = "/mosa_test_0000_"
ftype = ".npy"
dislocs_dirname = "identify_multi"
perfect_dirname = "ignored"
include_perfect_crystal = false
