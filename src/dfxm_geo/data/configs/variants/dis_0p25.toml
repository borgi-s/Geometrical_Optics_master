# dis = 0.25 µm dislocation spacing. ndis=7501 is the minimum recommended
# by init_forward.py to avoid edge effects at this density.

[reciprocal]
hkl = [-1, 1, -1]   # Al 111 reflection — preserves pre-D implicit default
keV = 17.0

[scan.phi]
range = 6e-4
steps = 61

[scan.chi]
range = 2e-3
steps = 61

[crystal]
mode = "wall"

[crystal.wall]
dis = 0.25
ndis = 7501
sample_remount = "S1"

[io]
fn_prefix = "/mosa_test_0000_"
ftype = ".npy"
dislocs_dirname = "images_dis0p25"
perfect_dirname = "images_dis0p25_perf_crystal"
include_perfect_crystal = true
